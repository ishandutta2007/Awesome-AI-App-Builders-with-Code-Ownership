<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4158D0">
        <animate attributeName="stop-color" values="#4158D0;#C850C0;#FFCC70;#4158D0" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#C850C0">
        <animate attributeName="stop-color" values="#C850C0;#FFCC70;#4158D0;#C850C0" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="15" fill="url(#bg)" />
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle" alignment-baseline="middle">
    Awesome AI App Builders
    <animate attributeName="y" values="110;90;110" dur="3s" repeatCount="indefinite" />
  </text>
  <text x="400" y="140" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" alignment-baseline="middle" opacity="0.9">
    with Code Ownership
  </text>
</svg>
